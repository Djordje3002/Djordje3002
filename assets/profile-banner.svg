<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Djordje Kartaljevic — AI Engineering and Full-Stack Development</title>
  <desc id="desc">A dark blue and violet portfolio banner with Djordje's name, engineering focus, and core disciplines.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.5" stop-color="#0b1224"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientTransform="translate(1040 34) rotate(133) scale(430 330)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientTransform="translate(72 342) rotate(-35) scale(430 250)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="330" y1="0" x2="870" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#violetGlow)"/>
  <rect width="1200" height="360" rx="28" fill="url(#cyanGlow)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="700" letter-spacing="5">HELLO, I BUILD DIGITAL PRODUCTS</text>
    <text x="600" y="158" text-anchor="middle" fill="#f8fafc" font-size="54" font-weight="760" letter-spacing="0.5">Djordje Kartaljevic</text>
    <rect x="371" y="181" width="458" height="4" rx="2" fill="url(#accent)"/>
    <text x="600" y="226" text-anchor="middle" fill="#cbd5e1" font-size="22" font-weight="600" letter-spacing="1.2">AI ENGINEERING  ×  FULL-STACK DEVELOPMENT</text>
    <text x="600" y="267" text-anchor="middle" fill="#94a3b8" font-size="17">Reliable AI systems · Product-ready software · Mobile experiences</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" letter-spacing="1.2" text-anchor="middle">
    <g transform="translate(293 299)">
      <rect width="132" height="36" rx="18" fill="#0f172a" fill-opacity="0.78" stroke="#22d3ee" stroke-opacity="0.5"/>
      <text x="66" y="23" fill="#a5f3fc">AI SYSTEMS</text>
    </g>
    <g transform="translate(435 299)">
      <rect width="146" height="36" rx="18" fill="#0f172a" fill-opacity="0.78" stroke="#818cf8" stroke-opacity="0.56"/>
      <text x="73" y="23" fill="#c7d2fe">PYTHON / APIs</text>
    </g>
    <g transform="translate(591 299)">
      <rect width="164" height="36" rx="18" fill="#0f172a" fill-opacity="0.78" stroke="#a78bfa" stroke-opacity="0.58"/>
      <text x="82" y="23" fill="#ddd6fe">REACT / NEXT.JS</text>
    </g>
    <g transform="translate(765 299)">
      <rect width="142" height="36" rx="18" fill="#0f172a" fill-opacity="0.78" stroke="#f472b6" stroke-opacity="0.54"/>
      <text x="71" y="23" fill="#fbcfe8">SWIFTUI</text>
    </g>
  </g>
</svg>